<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blyxu | Facturación — Acceso Privado</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-page {
            width: 100%;
            max-width: 460px;
            text-align: center;
            animation: fadeInUp .8s cubic-bezier(.16,1,.3,1);
        }
        .login-back {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 500;
            margin-bottom: 2.5rem;
            transition: color .3s;
        }
        .login-back:hover { color: #fff; }
        .login-logo {
            height: 50px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(199,125,255,.3));
        }
        .login-card {
            background: var(--glass);
            border: 1px solid rgba(199,125,255,.2);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(25px);
            box-shadow: 0 30px 80px rgba(0,0,0,.4);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff6b6b, #c0392b, transparent);
        }
        .login-shield {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: block;
            animation: shieldPulse 3s infinite;
        }
        @keyframes shieldPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .login-card h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: .4rem;
            background: linear-gradient(135deg, #fff, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-card > p {
            color: var(--text-muted);
            font-size: .9rem;
            margin-bottom: 2.5rem;
        }
        .login-warning {
            display: flex;
            align-items: center;
            gap: .6rem;
            background: rgba(255,107,107,.08);
            border: 1px solid rgba(255,107,107,.15);
            border-radius: 12px;
            padding: .8rem 1rem;
            margin-bottom: 2rem;
            font-size: .82rem;
            color: rgba(255,107,107,.85);
            text-align: left;
        }
        .login-warning svg { min-width: 18px; }
        .btn-facturacion {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            box-shadow: 0 8px 25px rgba(231,76,60,.3);
        }
        .btn-facturacion:hover {
            box-shadow: 0 12px 35px rgba(231,76,60,.45);
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <div class="login-page">
        <a href="index.html" class="login-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Volver al inicio
        </a>

        <img src="logo.png" alt="Blyxu" class="login-logo">

        <div class="login-card">
            <span class="login-shield">🛡️</span>
            <h1>Facturación</h1>
            <p>Área privada — Solo personal autorizado</p>

            <div class="login-warning">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
                <span>Este acceso es exclusivo para administradores. Los intentos no autorizados serán registrados.</span>
            </div>

            <form id="form-facturacion" class="catalog-form">
                <div class="input-wrap">
                    <input type="password" id="pass-facturacion" required placeholder="Clave de administrador" autocomplete="off">
                    <div class="input-focus-line"></div>
                </div>
                <div id="error-facturacion" class="form-error">Clave incorrecta — Acceso denegado</div>
                <button type="submit" class="btn-catalog btn-facturacion">
                    <span>Acceder a Facturación</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('form-facturacion').addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('pass-facturacion').value;
            const err = document.getElementById('error-facturacion');

            if (pass !== '3112368622') {
                err.style.display = 'block';
                // Shake animation
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                card.offsetHeight; // trigger reflow
                card.style.animation = 'shake .4s ease';
                return;
            }

            err.style.display = 'none';
            const btn = this.querySelector('.btn-facturacion span');
            btn.textContent = 'Verificando...';
            this.querySelector('.btn-facturacion').style.opacity = '.7';

            setTimeout(() => {
                // Aquí puedes redirigir a tu sistema de facturación
                // Por ahora muestra un mensaje de bienvenida
                document.querySelector('.login-card').innerHTML = `
                    <span style="font-size:3.5rem;display:block;margin-bottom:1rem;">✅</span>
                    <h1 style="background:linear-gradient(135deg,#fff,#25D366);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Acceso Concedido</h1>
                    <p style="color:var(--text-muted);margin-top:.5rem;">Bienvenido al área de facturación</p>
                    <div style="margin-top:2rem;padding:2rem;background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.2);border-radius:16px;">
                        <p style="color:#25D366;font-weight:600;font-size:.95rem;">🔓 Panel de Facturación Activo</p>
                        <p style="color:var(--text-muted);font-size:.85rem;margin-top:.5rem;">Aquí irá el enlace a tu sistema de facturación.</p>
                    </div>
                    <a href="index.html" style="display:inline-block;margin-top:2rem;color:var(--purple-light);text-decoration:none;font-weight:600;font-size:.9rem;">← Volver al inicio</a>
                `;
            }, 1000);
        });
    </script>

    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
    </style>
</body>
</html>
